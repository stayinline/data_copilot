<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Copilot</title>
<link rel="icon" type="image/png" href="/static/icon.png" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #212121;
    --sidebar-bg: #171717;
    --main-bg: #212121;
    --input-bg: #2f2f2f;
    --border: #333;
    --text: #ececec;
    --text-dim: #888;
    --user-bg: #2f3d2f;
    --thinking-bg: #1e1e2e;
    --tool-bg: #1a2332;
    --accent: #10a37f;
    --max-w: 860px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    padding: 12px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  #sidebar .new-chat {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }

  #sidebar .new-chat:hover { background: var(--input-bg); }

  #sidebar .new-chat svg { flex-shrink: 0; }

  #sidebar .history {
    margin-top: 16px;
    flex: 1;
    overflow-y: auto;
  }

  #sidebar .history-label {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 8px;
    letter-spacing: 0.5px;
  }

  #sidebar .history-item {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s;
  }

  #sidebar .history-item:hover { background: var(--input-bg); }

  /* Main */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #header .logo-icon {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    margin-right: 10px;
    flex-shrink: 0;
  }

  #header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  #header .mode-tag {
    position: absolute;
    right: 20px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--input-bg);
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
  }

  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .msg-wrapper {
    padding: 24px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: fadein 0.3s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrapper .msg-container {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 16px;
  }

  .msg-wrapper.user .msg-container {
    max-width: var(--max-w);
  }

  .msg-wrapper .avatar {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .msg-wrapper.user .avatar {
    background: var(--accent);
    color: #fff;
  }

  .msg-wrapper.assistant .avatar {
    background: #5436da;
    color: #fff;
  }

  .msg-content {
    flex: 1;
    min-width: 0;
  }

  .msg-label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .msg-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-text.md { white-space: normal; }

  /* Thinking steps */
  .thinking-block {
    background: var(--thinking-bg);
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .thinking-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    user-select: none;
    transition: background 0.1s;
  }

  .thinking-header:hover { background: rgba(255,255,255,0.03); }

  .thinking-header .arrow {
    transition: transform 0.2s;
    font-size: 10px;
  }

  .thinking-header.collapsed .arrow {
    transform: rotate(-90deg);
  }

  .thinking-body {
    padding: 0 12px 10px;
    font-size: 13px;
    line-height: 1.6;
    color: #aaa;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .thinking-body.hidden {
    display: none;
  }

  /* RCA result card */
  .rca-card {
    background: #1e1025;
    border: 1px solid #3a2050;
    border-radius: 10px;
    margin-bottom: 12px;
    padding: 0;
    overflow: hidden;
    animation: fadein 0.3s ease;
  }

  .rca-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #2a1545, #1e1025);
    border-bottom: 1px solid #3a2050;
    cursor: pointer;
    user-select: none;
  }

  .rca-header .rca-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #5a3080;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .rca-header .rca-icon svg {
    width: 16px;
    height: 16px;
    color: #c9a0ff;
  }

  .rca-header .rca-title {
    font-size: 13px;
    font-weight: 600;
    color: #d4b0ff;
  }

  .rca-header .rca-subtitle {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .rca-header .rca-toggle {
    margin-left: auto;
    font-size: 10px;
    color: #666;
    transition: transform 0.2s;
  }

  .rca-header.collapsed .rca-toggle {
    transform: rotate(-90deg);
  }

  .rca-body {
    padding: 14px 16px;
  }

  .rca-body.hidden {
    display: none;
  }

  /* RCA summary row */
  .rca-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .rca-summary .stat {
    flex: 1;
    min-width: 120px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .rca-summary .stat .stat-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .rca-summary .stat .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: #e06e6e;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  .rca-summary .stat .stat-value.normal {
    color: #8ac68a;
  }

  .rca-summary .stat .stat-value.neutral {
    color: #aaa;
  }

  /* RCA dimension sections */
  .rca-section {
    margin-bottom: 10px;
  }

  .rca-section-title {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .rca-section-title .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5a3080;
  }

  .rca-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .rca-table th {
    text-align: left;
    color: #666;
    font-weight: 500;
    padding: 4px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .rca-table td {
    color: #bbb;
    padding: 4px 8px;
  }

  .rca-table tr.worst {
    background: rgba(224,110,110,0.08);
    border-radius: 4px;
  }

  .rca-table tr.worst td {
    color: #e06e6e;
    font-weight: 600;
  }

  .rca-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(224,110,110,0.15);
    color: #e06e6e;
    font-weight: 600;
  }

  /* Tool call block */
  .tool-block {
    background: var(--tool-bg);
    border: 1px solid #253040;
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    user-select: none;
    transition: background 0.1s;
  }

  .tool-header:hover { background: rgba(255,255,255,0.03); }

  .tool-header .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .tool-header .arrow {
    transition: transform 0.2s;
    font-size: 10px;
  }

  .tool-header.collapsed .arrow {
    transform: rotate(-90deg);
  }

  .tool-body {
    padding: 0 12px 10px;
    font-size: 12px;
    line-height: 1.6;
    color: #999;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .tool-body.hidden {
    display: none;
  }

  /* SQL fix block */
  .sql-fix-block {
    background: #1a2a1a;
    border: 1px solid #2a4a2a;
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    animation: fadein 0.3s ease;
  }

  .sql-fix-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    color: #6a9f78;
    user-select: none;
    transition: background 0.1s;
  }

  .sql-fix-header:hover { background: rgba(255,255,255,0.03); }

  .sql-fix-header .icon {
    color: #4caf50;
    font-size: 14px;
  }

  .sql-fix-header .arrow {
    transition: transform 0.2s;
    font-size: 10px;
  }

  .sql-fix-header.collapsed .arrow {
    transform: rotate(-90deg);
  }

  .sql-fix-body {
    padding: 0 12px 12px;
    font-size: 12px;
    line-height: 1.5;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  .sql-fix-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sql-fix-label:first-child { margin-top: 8px; }

  .sql-fix-code {
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 8px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
  }

  .sql-fix-code.original {
    color: #e57373;
    text-decoration: line-through;
    text-decoration-color: rgba(229,115,115,0.4);
  }

  .sql-fix-code.fixed {
    color: #81c784;
  }

  .sql-fix-arrow {
    text-align: center;
    color: #4caf50;
    font-size: 16px;
    padding: 4px 0;
  }

  /* Performance metrics */
  .perf-metrics {
    background: #1a2a1e;
    border: 1px solid #2a4a2a;
    border-radius: 10px;
    margin-bottom: 16px;
    padding: 14px 16px;
    overflow: hidden;
  }

  .perf-metrics .metric-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .perf-metrics .metric-title svg { flex-shrink: 0; }

  .perf-metrics .metric-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .perf-metrics .metric-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .perf-metrics .metric-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .perf-metrics .metric-value {
    font-size: 14px;
    font-weight: 600;
    color: #8ac68a;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  .perf-metrics .metric-value.secondary {
    color: #aaa;
  }

  .perf-metrics .metric-divider {
    grid-column: 1 / -1;
    border-top: 1px solid rgba(255,255,255,0.05);
    margin: 4px 0;
  }

  /* Decision chain */
  .decision-chain {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    margin-bottom: 16px;
    padding: 14px 16px;
    overflow: hidden;
  }

  .decision-chain .chain-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .decision-chain .chain-title svg {
    flex-shrink: 0;
  }

  .decision-chain .chain-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .decision-chain .chain-row:last-child {
    margin-bottom: 0;
  }

  .decision-chain .chain-label {
    font-size: 11px;
    color: #666;
    width: 60px;
    flex-shrink: 0;
    text-align: right;
  }

  .decision-chain .chain-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 500;
  }

  .decision-chain .chain-badge.intent {
    background: #2d2b55;
    color: #b8b5ff;
  }

  .decision-chain .chain-badge.intent.tool {
    background: #1a3a4a;
    color: #6ec6e0;
  }

  .decision-chain .chain-badge.intent.troubleshoot {
    background: #4a2a2a;
    color: #e08a6e;
  }

  .decision-chain .chain-badge.intent.direct {
    background: #2a3a2a;
    color: #8ac68a;
  }

  .decision-chain .chain-badge.mode {
    background: #2a2a3a;
    color: #aaa;
    font-size: 11px;
  }

  .decision-chain .chain-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .decision-chain .chain-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #999;
    animation: fadein 0.3s ease;
  }

  .decision-chain .chain-step .step-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
  }

  .decision-chain .chain-step .step-icon.active {
    background: #2d2b55;
    color: #b8b5ff;
    animation: pulse 1.5s infinite;
  }

  .decision-chain .chain-step .step-icon.done {
    background: #1a3a2a;
    color: #6ec68a;
  }

  .decision-chain .chain-step .step-icon.error {
    background: #3a1a1a;
    color: #e06e6e;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Thinking animation */
  .thinking-anim {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .thinking-anim .dots span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
  }

  .thinking-anim .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-anim .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  /* Input bar */
  #input-bar {
    padding: 16px 24px 24px;
  }

  #input-bar .input-inner {
    max-width: var(--max-w);
    margin: 0 auto;
  }

  #input-wrap {
    display: flex;
    gap: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 6px 6px 16px;
    transition: border-color 0.15s;
  }

  #input-wrap:focus-within { border-color: #555; }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 15px;
    outline: none;
    padding: 8px 0;
    font-family: inherit;
  }

  #input::placeholder { color: var(--text-dim); }

  #send {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
    align-self: flex-end;
  }

  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.3; cursor: default; }

  #send svg { width: 18px; height: 18px; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* Welcome — centered overlay */
  #welcome {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
    z-index: 10;
    transition: opacity 0.35s, transform 0.35s;
    background: var(--bg);
  }

  #welcome.hidden {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  /* Bottom input bar — hidden initially, shown after first message */
  #input-bar {
    display: none;
  }

  #input-bar.visible {
    display: block;
  }

  #welcome h2 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #10a37f, #5436da);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #welcome p {
    font-size: 15px;
    color: var(--text-dim);
  }

  /* Welcome input bar (centered) */
  #welcome-input-wrap {
    display: flex;
    gap: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px 8px 8px 20px;
    width: 600px;
    max-width: 90vw;
    transition: border-color 0.15s;
  }

  #welcome-input-wrap:focus-within { border-color: #555; }

  #welcome-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 16px;
    outline: none;
    padding: 10px 0;
    font-family: inherit;
  }

  #welcome-input::placeholder { color: var(--text-dim); }

  #welcome-send {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  #welcome-send:hover { opacity: 0.85; }
  #welcome-send:disabled { opacity: 0.3; cursor: default; }
  #welcome-send svg { width: 18px; height: 18px; }

  /* Streaming */
  .streaming-msg {
    min-height: 1.7em;
  }

  .streaming-msg .typing-cursor::after {
    content: '';
    animation: cursor-blink 0.8s step-end infinite;
    border-right: 2px solid var(--text-dim);
    margin-left: 2px;
  }

  @keyframes cursor-blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* Markdown content */
  .msg-text.md p { margin: 0 0 0.8em 0; }
  .msg-text.md p:last-child { margin-bottom: 0; }

  .msg-text.md strong { font-weight: 600; }
  .msg-text.md em { font-style: italic; }

  .msg-text.md code {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.9em;
  }

  .msg-text.md pre {
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }

  .msg-text.md pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.6;
  }

  .msg-text.md table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    font-size: 13px;
  }

  .msg-text.md th, .msg-text.md td {
    border-bottom: 1px solid #333;
    padding: 6px 10px;
    text-align: left;
  }

  .msg-text.md th {
    font-weight: 600;
  }

  .msg-text.md ul, .msg-text.md ol {
    padding-left: 22px;
    margin: 6px 0;
  }

  .msg-text.md li { margin: 3px 0; line-height: 1.7; }

  .msg-text.md blockquote {
    border-left: 2px solid #555;
    padding-left: 12px;
    margin: 10px 0;
    color: var(--text-dim);
  }

  .msg-text.md a { color: #7eb8f0; text-decoration: none; }
  .msg-text.md a:hover { text-decoration: underline; }

  .msg-text.md hr {
    border: none;
    border-top: 1px solid #333;
    margin: 14px 0;
  }

  /* Floating assistant */
  #floating-assistant {
    position: fixed;
    bottom: 80px;
    right: 30px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  #assistant-toggle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 4px 16px rgba(16,163,127,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #assistant-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(16,163,127,0.45);
  }

  #assistant-toggle:active { cursor: grabbing; }

  #assistant-toggle svg { width: 24px; height: 24px; }

  #assistant-panel {
    position: fixed;
    bottom: 144px;
    right: 30px;
    width: 360px;
    height: 480px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  #assistant-panel.open { display: flex; }

  #assistant-panel .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    background: #1e1e1e;
    cursor: move;
  }

  #assistant-panel .panel-header span {
    font-size: 14px;
    font-weight: 600;
  }

  #assistant-panel .panel-close {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
  }

  #assistant-panel .panel-close:hover { color: #fff; }

  #assistant-chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #assistant-chat::-webkit-scrollbar { width: 4px; }
  #assistant-chat::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

  .assistant-msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .assistant-msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .assistant-msg.bot {
    align-self: flex-start;
    background: #383838;
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  #assistant-input-wrap {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px solid #333;
    background: #1e1e1e;
  }

  #assistant-input {
    flex: 1;
    background: #333;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }

  #assistant-input:focus { border-color: var(--accent); }

  #assistant-send {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
  }

  #assistant-send:hover { opacity: 0.85; }
  #assistant-send svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <button class="new-chat" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New chat
  </button>
  <div class="history">
    <div class="history-label">Today</div>
    <div id="history-list"></div>
  </div>
</div>

<!-- Main content -->
<div id="main">
  <div id="header">
    <img class="logo-icon" src="/static/icon.png" alt="Logo" />
    <h1>Mega Data Copilot</h1>
    <span class="mode-tag" id="mode-tag"></span>
  </div>

  <div id="chat"></div>

  <!-- Centered welcome dialog -->
  <div id="welcome">
    <h2>Mega Data Copilot</h2>
    <p>Ask me anything about your data</p>
    <div id="welcome-input-wrap">
      <input id="welcome-input" type="text" placeholder="Ask me anything..." autocomplete="off" />
      <button id="welcome-send" onclick="sendFromWelcome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-inner">
      <div id="input-wrap">
        <input id="input" type="text" placeholder="Message Data Copilot..." autocomplete="off" />
        <button id="send" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Copilot uses AI. Check important info.</div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/chat/stream';
const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 10);
let loading = false;
let conversationHistory = [];

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const modeTag = document.getElementById('mode-tag');
const welcome = document.getElementById('welcome');
const welcomeInput = document.getElementById('welcome-input');

// Load mode tag
modeTag.textContent = 'LangGraph';

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !loading) send();
});

welcomeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !loading) sendFromWelcome();
});

function sendFromWelcome() {
  const text = welcomeInput.value.trim();
  if (!text) return;
  input.value = text;
  // Hide welcome, show bottom input bar
  welcome.classList.add('hidden');
  document.getElementById('input-bar').classList.add('visible');
  send();
}

function newChat() {
  chat.innerHTML = '';
  conversationHistory = [];
  welcome.classList.remove('hidden');
  document.getElementById('input-bar').classList.remove('visible');
  welcomeInput.value = '';
  welcomeInput.focus();
}

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

// Append user message
function appendUserMsg(text) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper user';
  wrapper.innerHTML = `
    <div class="msg-container">
      <div class="avatar">U</div>
      <div class="msg-content">
        <div class="msg-text">${escHtml(text)}</div>
      </div>
    </div>`;
  chat.appendChild(wrapper);
  scrollToBottom();
}

// Append assistant with streaming support
function createAssistantMsg() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper assistant';
  wrapper.innerHTML = `
    <div class="msg-container">
      <div class="avatar">C</div>
      <div class="msg-content">
        <div class="perf-metrics-wrap"></div>
        <div class="decision-chain-wrap"></div>
        <div class="steps"></div>
        <div class="msg-text streaming-msg"></div>
      </div>
    </div>`;
  chat.appendChild(wrapper);
  scrollToBottom();
  return {
    perf: wrapper.querySelector('.perf-metrics-wrap'),
    chain: wrapper.querySelector('.decision-chain-wrap'),
    steps: wrapper.querySelector('.steps'),
    body: wrapper.querySelector('.msg-text'),
  };
}

// Render performance metrics
function renderPerfMetrics(container, data) {
  function fmt(ms) {
    if (ms < 1000) return ms.toFixed(0) + 'ms';
    return (ms / 1000).toFixed(2) + 's';
  }
  container.innerHTML = `
    <div class="perf-metrics">
      <div class="metric-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        性能指标
      </div>
      <div class="metric-grid">
        <div class="metric-item">
          <span class="metric-label">总耗时</span>
          <span class="metric-value">${fmt(data.total_elapsed_ms)}</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">LLM 调用</span>
          <span class="metric-value secondary">${data.llm_calls} 次 / ${fmt(data.llm_latency_ms)}</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">工具调用</span>
          <span class="metric-value secondary">${data.tool_calls} 次 / 平均 ${fmt(data.tool_latency_ms)}</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric-item">
          <span class="metric-label">缓存命中</span>
          <span class="metric-value secondary">${data.cache_hits} / ${data.cache_hits + data.cache_misses}</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">工具成功/失败</span>
          <span class="metric-value secondary">${data.tool_success} / ${data.tool_fail}</span>
        </div>
      </div>
    </div>
  `;
}

// Create decision chain UI
function createDecisionChain(container, intent, label, mode) {
  const intentClass = intent === 'TOOL' ? 'tool' : intent === 'TROUBLESHOOT' ? 'troubleshoot' : 'direct';
  const modeLabel = mode === 'langgraph' ? 'LangGraph 多步规划' : 'ReAct 推理';
  container.innerHTML = `
    <div class="decision-chain">
      <div class="chain-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        AI 决策链路
      </div>
      <div class="chain-row">
        <span class="chain-label">意图</span>
        <span class="chain-badge intent ${intentClass}">${escHtml(label)}</span>
      </div>
      <div class="chain-row">
        <span class="chain-label">执行</span>
        <span class="chain-badge mode">${escHtml(modeLabel)}</span>
      </div>
      <div class="chain-steps" id="chain-steps"></div>
    </div>
  `;
}

// Add a step to the decision chain
function addChainStep(icon, text, state) {
  const container = document.getElementById('chain-steps');
  if (!container) return;
  const step = document.createElement('div');
  step.className = 'chain-step';
  step.innerHTML = `<span class="step-icon ${state}">${icon}</span><span>${escHtml(text)}</span>`;
  container.appendChild(step);
  scrollToBottom();
}

function addThinkingStep(container, text) {
  const block = document.createElement('div');
  block.className = 'thinking-block';
  block.innerHTML = `
    <div class="thinking-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
      <span class="arrow">&#9660;</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      Thinking
    </div>
    <div class="thinking-body">${escHtml(text)}</div>
  `;
  container.appendChild(block);
  scrollToBottom();
  return block.querySelector('.thinking-body');
}

function addToolStep(container, tool, input, result, latencyMs, fromCache) {
  // Detect RCA result and render as card
  if (tool === 'root_cause_analysis') {
    try {
      const data = JSON.parse(result);
      if (data && data.metric && data.overall) {
        data._latency_ms = latencyMs || 0;
        renderRCACard(container, data);
        return;
      }
    } catch (e) { /* fallback to raw */ }
  }

  const block = document.createElement('div');
  block.className = 'tool-block';
  let extraInfo = '';
  if (latencyMs != null) extraInfo += ` 耗时 ${Math.round(latencyMs)}ms`;
  if (fromCache) extraInfo += ' 缓存命中';
  block.innerHTML = `
    <div class="tool-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
      <span class="dot"></span>
      <span>${escHtml(tool)}</span>
      ${extraInfo ? `<span style="color:#555;font-size:10px;">${escHtml(extraInfo)}</span>` : ''}
      <span class="arrow">&#9660;</span>
    </div>
    <div class="tool-body">
      <div style="color:#6a9f78;margin-bottom:4px;">Input: ${escHtml(JSON.stringify(input))}</div>
      <div style="color:#888;">Result: ${escHtml(trunc(result, 500))}</div>
    </div>
  `;
  container.appendChild(block);
  scrollToBottom();
}

// Render RCA analysis result as a structured card
function renderRCACard(container, data) {
  const todayVal = data.overall?.today || 0;
  const yesterdayVal = data.overall?.yesterday || 0;
  const dropPct = data.overall?.drop_pct || 0;
  const metric = data.metric || 'GMV';
  const worstRegion = data.worst_region?.name || '—';
  const regionDrop = data.worst_region?.drop_pct || 0;
  const worstCat = data.worst_category?.name || '—';
  const catDrop = data.worst_category?.drop_pct || 0;
  const orderValid = data.order_validation;

  let sectionsHTML = '';

  // Worst region category table
  if (data.category_breakdown && data.category_breakdown.length > 0) {
    const rows = data.category_breakdown.map(r => {
      const isWorst = r.category === worstCat;
      return `<tr class="${isWorst ? 'worst' : ''}">
        <td>${escHtml(String(r.category))} ${isWorst ? '<span class="rca-badge">影响最大</span>' : ''}</td>
        <td>${escHtml(String(r.value))}</td>
        <td>${escHtml(String(r.yesterday_value))}</td>
        <td>-${escHtml(String(r.drop_pct))}%</td>
      </tr>`;
    }).join('');
    sectionsHTML += `
      <div class="rca-section">
        <div class="rca-section-title"><span class="dot"></span>类目下钻</div>
        <table class="rca-table">
          <tr><th>类目</th><th>当日值</th><th>前日值</th><th>变化</th></tr>
          ${rows}
        </table>
      </div>`;
  }

  // Order validation
  if (orderValid) {
    sectionsHTML += `
      <div class="rca-section">
        <div class="rca-section-title"><span class="dot"></span>订单交叉验证</div>
        <table class="rca-table">
          <tr><td>区域</td><td style="color:#c9a0ff;">${escHtml(String(orderValid.region))}</td></tr>
          <tr><td>类目</td><td style="color:#c9a0ff;">${escHtml(String(orderValid.category))}</td></tr>
          <tr><td>当日订单数</td><td>${escHtml(String(orderValid.today_order_count))}</td></tr>
          <tr><td>前日订单数</td><td>${escHtml(String(orderValid.yesterday_order_count))}</td></tr>
          <tr><td>订单下降</td><td style="color:#e06e6e;">-${escHtml(String(orderValid.order_drop_pct))}%</td></tr>
          <tr><td>当日金额</td><td>${escHtml(String(orderValid.today_total_amount))}</td></tr>
          <tr><td>前日金额</td><td>${escHtml(String(orderValid.yesterday_total_amount))}</td></tr>
          <tr><td>金额下降</td><td style="color:#e06e6e;">-${escHtml(String(orderValid.amount_drop_pct))}%</td></tr>
        </table>
      </div>`;
  }

  const card = document.createElement('div');
  card.className = 'rca-card';
  card.innerHTML = `
    <div class="rca-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
      <div class="rca-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div>
        <div class="rca-title">归因分析 · ${escHtml(metric)}</div>
        <div class="rca-subtitle">${escHtml(data.date_range?.yesterday || '')} vs ${escHtml(data.date_range?.today || '')}  |  耗时 ${Math.round(data._latency_ms || 0)}ms</div>
      </div>
      <span class="rca-toggle">&#9660;</span>
    </div>
    <div class="rca-body">
      <div class="rca-summary">
        <div class="stat">
          <div class="stat-label">前日 ${escHtml(metric)}</div>
          <div class="stat-value neutral">${escHtml(String(yesterdayVal))}</div>
        </div>
        <div class="stat">
          <div class="stat-label">当日 ${escHtml(metric)}</div>
          <div class="stat-value">${todayVal == 0 ? '0' : escHtml(String(todayVal))}</div>
        </div>
        <div class="stat">
          <div class="stat-label">整体下降</div>
          <div class="stat-value">-${escHtml(String(dropPct))}%</div>
        </div>
      </div>
      ${worstRegion !== '—' ? `
      <div class="rca-section">
        <div class="rca-section-title"><span class="dot"></span>最差区域</div>
        <table class="rca-table">
          <tr><td>区域</td><td style="color:#e06e6e;">${escHtml(worstRegion)}</td><td><span class="rca-badge">-${escHtml(String(regionDrop))}%</span></td></tr>
        </table>
      </div>` : ''}
      ${sectionsHTML}
    </div>
  `;
  container.appendChild(card);
  scrollToBottom();
}

function addSqlFixStep(container, originalSql, fixedSql) {
  const block = document.createElement('div');
  block.className = 'sql-fix-block';
  block.innerHTML = `
    <div class="sql-fix-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
      <span class="icon">&#10003;</span>
      <span>SQL 自动修复</span>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="sql-fix-body">
      <div class="sql-fix-label">原始 SQL（执行失败）</div>
      <div class="sql-fix-code original">${escHtml(originalSql)}</div>
      <div class="sql-fix-arrow">&#8595;</div>
      <div class="sql-fix-label">修复后 SQL（执行成功）</div>
      <div class="sql-fix-code fixed">${escHtml(fixedSql)}</div>
    </div>
  `;
  container.appendChild(block);
  scrollToBottom();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(s) {
  if (!s) return '';
  return marked.parse(s, { breaks: true });
}

function trunc(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

async function send() {
  const text = input.value.trim();
  if (!text || loading) return;

  loading = true;
  sendBtn.disabled = true;
  input.value = '';

  appendUserMsg(text);

  const msg = createAssistantMsg();
  let thinkingBody = null;
  let intentReceived = false;

  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer dev-token',
      },
      body: JSON.stringify({
        session_id: SESSION_ID,
        user_id: 'web-user',
        message: text,
      }),
    });

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullAnswer = '';
    let accumulatedThinking = '';
    let thinkingVisible = false;
    let currentEvent = '';
    let streamFinished = false;

    while (!streamFinished) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.trim()) continue;

        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7).trim();
          continue;
        }

        if (line.startsWith('data: ')) {
          const dataStr = line.slice(6).trim();
          if (!dataStr) continue;

          try {
            const data = JSON.parse(dataStr);

            if (currentEvent === 'intent') {
              if (!intentReceived) {
                intentReceived = true;
                createDecisionChain(msg.chain, data.intent, data.label, data.mode);
                addChainStep('1', '意图识别完成', 'done');
                if (data.intent !== 'DIRECT') {
                  addChainStep('2', '等待执行...', 'active');
                }
              }
            }

            if (currentEvent === 'thinking') {
              if (!thinkingVisible && !thinkingBody) {
                thinkingVisible = true;
                const roundNum = data.round || data.tool_calls || '';
                thinkingBody = addThinkingStep(msg.steps, roundNum ? `Processing... (round ${roundNum})` : '正在思考...');
                if (document.getElementById('chain-steps')) {
                  const steps = document.querySelectorAll('#chain-steps .chain-step');
                  for (const s of steps) {
                    const icon = s.querySelector('.step-icon');
                    if (icon && icon.classList.contains('active')) {
                      icon.classList.remove('active');
                      icon.classList.add('done');
                      icon.textContent = '2';
                    }
                  }
                  addChainStep('3', '正在规划查询步骤...', 'active');
                }
              } else if (thinkingBody) {
                const roundNum = data.round || data.tool_calls || '';
                thinkingBody.innerHTML = escHtml(roundNum ? `Processing... (round ${roundNum})` : '正在思考...');
              }
            }

            if (currentEvent === 'tool_call') {
              // Update decision chain
              if (document.getElementById('chain-steps')) {
                const steps = document.querySelectorAll('#chain-steps .chain-step');
                for (const s of steps) {
                  const icon = s.querySelector('.step-icon');
                  if (icon && icon.classList.contains('active')) {
                    icon.classList.remove('active');
                    icon.classList.add('done');
                    icon.textContent = '3';
                  }
                }
                addChainStep('4', `调用工具: ${data.tool}`, 'active');
              }
            }

            if (currentEvent === 'tool_result') {
              addToolStep(msg.steps, data.tool, data.input || {}, data.result || '', data.latency_ms, data.from_cache);
              if (document.getElementById('chain-steps')) {
                const steps = document.querySelectorAll('#chain-steps .chain-step');
                for (const s of steps) {
                  const icon = s.querySelector('.step-icon');
                  if (icon && icon.classList.contains('active')) {
                    icon.classList.remove('active');
                    icon.classList.add('done');
                  }
                }
                addChainStep('4', `工具返回: ${data.tool}`, 'done');
                addChainStep('5', '等待规划...', 'active');
              }
            }

            if (currentEvent === 'sql_fix') {
              addSqlFixStep(msg.steps, data.original_sql || '', data.fixed_sql || '');
            }

            if (currentEvent === 'answer_token') {
              fullAnswer = data.text || '';
              accumulatedThinking = fullAnswer;
              msg.body.classList.add('md');
              msg.body.innerHTML = renderMd(fullAnswer);
            }

            if (currentEvent === 'final_answer') {
              msg.body.classList.remove('streaming-msg');
              fullAnswer = data.answer || fullAnswer || 'No answer generated.';
              // Complete decision chain
              if (document.getElementById('chain-steps')) {
                const steps = document.querySelectorAll('#chain-steps .chain-step');
                for (const s of steps) {
                  const icon = s.querySelector('.step-icon');
                  if (icon && icon.classList.contains('active')) {
                    icon.classList.remove('active');
                    icon.classList.add('done');
                  }
                }
                const lastStep = document.getElementById('chain-steps').lastElementChild;
                if (lastStep && !lastStep.querySelector('.step-icon.done')) {
                  // Already handled by tool_result step
                }
                addChainStep('✓', '回答生成完成', 'done');
              }
              // Preserve the accumulated thinking as a visible thinking block
              if (accumulatedThinking) {
                const thinkingBlock = document.createElement('div');
                thinkingBlock.className = 'thinking-block';
                thinkingBlock.innerHTML = `
                  <div class="thinking-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
                    <span class="arrow">&#9660;</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                    Thinking
                  </div>
                  <div class="thinking-body md">${renderMd(accumulatedThinking)}</div>
                `;
                msg.steps.appendChild(thinkingBlock);
              }
              msg.body.classList.add('md');
              msg.body.innerHTML = renderMd(fullAnswer);
            }

            if (currentEvent === 'metrics') {
              renderPerfMetrics(msg.perf, data);
            }

            if (currentEvent === 'done') {
              streamFinished = true;
              try {
                await reader.cancel();
              } catch (e) {
                // ignore
              }
            }
          } catch (e) {
            // skip bad JSON
          }
        }
      }
    }

    // Save to sidebar
    addHistoryItem(text);
    conversationHistory.push({ role: 'user', content: text });
    conversationHistory.push({ role: 'assistant', content: fullAnswer });

  } catch (err) {
    msg.body.classList.remove('streaming-msg');
    msg.body.innerHTML = `<span style="color:#e55;">Error: ${escHtml(err.message)}</span>`;
    if (document.getElementById('chain-steps')) {
      const steps = document.querySelectorAll('#chain-steps .chain-step');
      for (const s of steps) {
        const icon = s.querySelector('.step-icon');
        if (icon && icon.classList.contains('active')) {
          icon.classList.remove('active');
          icon.classList.add('error');
        }
      }
      addChainStep('!', `请求失败: ${err.message}`, 'error');
    }
  }

  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

function addHistoryItem(text) {
  const item = document.createElement('div');
  item.className = 'history-item';
  item.textContent = text;
  item.onclick = newChat;
  const list = document.getElementById('history-list');
  list.prepend(item);
}

// Floating assistant helpers
function sendAssistantMsg() {
  const input = document.getElementById('assistant-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const chat = document.getElementById('assistant-chat');
  chat.appendChild(makeBubble(text, 'user'));

  const botBubble = makeBubble('...', 'bot');
  chat.appendChild(botBubble);
  chat.scrollTop = chat.scrollHeight;

  // Call the same backend API
  const resp = fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer dev-token' },
    body: JSON.stringify({
      session_id: 'assistant-' + SESSION_ID,
      user_id: 'web-user',
      message: text,
    }),
  });

  resp.then(async r => {
    if (!r.ok) { botBubble.textContent = '请求失败'; return; }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let answer = '';
    let currentEvent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('event: ')) { currentEvent = line.slice(7).trim(); continue; }
        if (line.startsWith('data: ')) {
          const dataStr = line.slice(6).trim();
          if (!dataStr) continue;
          try {
            const data = JSON.parse(dataStr);
            if (currentEvent === 'answer_token') { answer = data.text; }
            if (currentEvent === 'final_answer') { answer = data.answer || answer; }
            if (currentEvent === 'done') { break; }
          } catch (e) {}
        }
      }
      botBubble.textContent = answer || '...';
      chat.scrollTop = chat.scrollHeight;
    }
    botBubble.textContent = answer || '未收到回答';
  }).catch(() => {
    botBubble.textContent = '请求失败，请检查网络';
  });
}

function makeBubble(text, type) {
  const div = document.createElement('div');
  div.className = 'assistant-msg ' + type;
  div.textContent = text;
  return div;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('assistant-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendAssistantMsg();
  });
});
</script>

<!-- Floating Assistant -->
<div id="floating-assistant">
  <div id="assistant-panel">

      <span>Data Copilot 助手</span>
      <button class="panel-close" onclick="document.getElementById('assistant-panel').classList.remove('open')">&times;</button>

        </svg>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>
</div>

<script>
// Floating assistant drag & toggle
(function() {
  const panel = document.getElementById('assistant-panel');
  const toggle = document.getElementById('assistant-toggle');
  const header = panel.querySelector('.panel-header');

  let panelOpen = false;
  let isDragging = false;
  let moved = false;
  let dragOffX = 0, dragOffY = 0;

  function getPos(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  toggle.addEventListener('mousedown', (e) => {
    const pos = getPos(e);
    const rect = toggle.getBoundingClientRect();
    dragOffX = pos.x - rect.left - rect.width / 2;
    dragOffY = pos.y - rect.top - rect.height / 2;
    moved = false;
    isDragging = true;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
  });

  function onMove(e) {
    if (!isDragging) return;
    moved = true;
    const pos = getPos(e);
    toggle.style.position = 'fixed';
    toggle.style.left = (pos.x - dragOffX - 26) + 'px';
    toggle.style.top = (pos.y - dragOffY - 26) + 'px';
    toggle.style.right = 'auto';
    toggle.style.bottom = 'auto';
  }

  function onEnd(e) {
    isDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    if (!moved) {
      panelOpen = !panelOpen;
      panel.classList.toggle('open', panelOpen);
    }
  }

  // Panel header drag
  let pOffX = 0, pOffY = 0;
  header.addEventListener('mousedown', (e) => {
    e.preventDefault();
    pOffX = e.clientX;
    pOffY = e.clientY;
    document.addEventListener('mousemove', onPanelMove);
    document.addEventListener('mouseup', onPanelEnd);
  });

  function onPanelMove(e) {
    const dx = e.clientX - pOffX;
    const dy = e.clientY - pOffY;
    const rect = panel.getBoundingClientRect();
    panel.style.position = 'fixed';
    panel.style.left = (rect.left + dx) + 'px';
    panel.style.top = (rect.top + dy) + 'px';
    panel.style.right = 'auto';
    panel.style.bottom = 'auto';
    panel.style.margin = '0';
    pOffX = e.clientX;
    pOffY = e.clientY;
  }

  function onPanelEnd() {
    document.removeEventListener('mousemove', onPanelMove);
    document.removeEventListener('mouseup', onPanelEnd);
  }
})();
</script>
